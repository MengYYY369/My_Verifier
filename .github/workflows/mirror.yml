name: Mirror Repository

permissions:
  contents: read

on:
  push:
    branches:
      - '**'

  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Get Branch Name
        id: branch
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      # GitLab
      - name: Push to GitLab
        continue-on-error: true
        run: |
          git remote remove gitlab || true
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/MengYYY369/my_verifier.git

          for i in 1 2 3; do
            git push gitlab HEAD:${{ steps.branch.outputs.branch }} && break
            echo "GitLab retry $i failed, retrying in 10 seconds..."
            sleep 10
          done

          git push --tags gitlab

      # Gitee
      - name: Push to Gitee
        continue-on-error: true
        run: |
          git remote remove gitee || true
          git remote add gitee https://MengYYY666:${{ secrets.GITEE_TOKEN }}@gitee.com/MengYYY666/My_Verifier.git

          for i in 1 2 3; do
            git push gitee HEAD:${{ steps.branch.outputs.branch }} && break
            echo "Gitee retry $i failed, retrying in 10 seconds..."
            sleep 10
          done

          git push --tags gitee

      # GitCode
      - name: Push to GitCode
        continue-on-error: true
        run: |
          git remote remove gitcode || true
          git remote add gitcode https://2301_76858796:${{ secrets.GITCODE_TOKEN }}@gitcode.com/2301_76858796/My_Verifier.git

          for i in 1 2 3; do
            git push gitcode HEAD:${{ steps.branch.outputs.branch }} && break
            echo "GitCode retry $i failed, retrying in 10 seconds..."
            sleep 10
          done

          git push --tags gitcode
