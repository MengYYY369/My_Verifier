name: Mirror Repository

permissions:
  contents: read

on:
  push:
    branches:
      - '**'

  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Get Branch Name
        id: branch
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      # Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF

      # GitLab
      - name: Push to GitLab
        continue-on-error: true
        run: |
          success=false

          git remote remove gitlab || true
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/MengYYY369/my_verifier.git

          for i in 1 2 3; do
            echo "GitLab HTTPS attempt $i..."

            timeout 60 git push gitlab HEAD:${{ steps.branch.outputs.branch }} && success=true && break

            echo "Retrying in 10 seconds..."
            sleep 10
          done

          if [ "$success" = false ]; then

            echo "Switching GitLab to SSH..."

            git remote remove gitlab || true
            git remote add gitlab git@gitlab.com:MengYYY369/my_verifier.git

            for i in 1 2 3; do
              echo "GitLab SSH attempt $i..."

              timeout 60 git push gitlab HEAD:${{ steps.branch.outputs.branch }} && success=true && break

              echo "Retrying in 10 seconds..."
              sleep 10
            done
          fi

          timeout 60 git push --tags gitlab || true

      # Gitee
      - name: Push to Gitee
        continue-on-error: true
        run: |
          success=false

          git remote remove gitee || true
          git remote add gitee https://MengYYY666:${{ secrets.GITEE_TOKEN }}@gitee.com/MengYYY666/My_Verifier.git

          for i in 1 2 3; do
            echo "Gitee HTTPS attempt $i..."

            timeout 60 git push gitee HEAD:${{ steps.branch.outputs.branch }} && success=true && break

            echo "Retrying in 10 seconds..."
            sleep 10
          done

          if [ "$success" = false ]; then

            echo "Switching Gitee to SSH..."

            git remote remove gitee || true
            git remote add gitee git@gitee.com:MengYYY666/My_Verifier.git

            for i in 1 2 3; do
              echo "Gitee SSH attempt $i..."

              timeout 60 git push gitee HEAD:${{ steps.branch.outputs.branch }} && success=true && break

              echo "Retrying in 10 seconds..."
              sleep 10
            done
          fi

          timeout 60 git push --tags gitee || true

      # GitCode
      - name: Push to GitCode
        continue-on-error: true
        run: |
          success=false

          git remote remove gitcode || true
          git remote add gitcode https://2301_76858796:${{ secrets.GITCODE_TOKEN }}@gitcode.com/2301_76858796/My_Verifier.git

          for i in 1 2 3; do
            echo "GitCode HTTPS attempt $i..."

            timeout 60 git push gitcode HEAD:${{ steps.branch.outputs.branch }} && success=true && break

            echo "Retrying in 10 seconds..."
            sleep 10
          done

          if [ "$success" = false ]; then

            echo "Switching GitCode to SSH..."

            git remote remove gitcode || true
            git remote add gitcode git@gitcode.com:2301_76858796/My_Verifier.git

            for i in 1 2 3; do
              echo "GitCode SSH attempt $i..."

              timeout 60 git push gitcode HEAD:${{ steps.branch.outputs.branch }} && success=true && break

              echo "Retrying in 10 seconds..."
              sleep 10
            done
          fi

          timeout 60 git push --tags gitcode || true
